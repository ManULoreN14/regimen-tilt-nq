name: Actualizar Régimen+Tilt

on:
  schedule:
    # 2:00 Madrid, todo el año (ajustado por cambio de hora).
    # Marzo-Octubre (CEST, UTC+2): 2:00 Madrid -> 00:00 UTC.
    - cron: '0 0 * 3-10 1-5'
    # Noviembre-Febrero (CET, UTC+1): 2:00 Madrid -> 01:00 UTC.
    - cron: '0 1 * 1,2,11,12 1-5'
  workflow_dispatch: {}   # botón manual "Run workflow" en la pestaña Actions

permissions:
  contents: write          # necesario para que la Action pueda hacer push

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pandas numpy yfinance requests
      - run: python generar_datos.py
      - run: python construir_sistema.py
      # velas para la pestaña "Estudio técnico". Si falla (p.ej. intradía
      # caído), no tumba el workflow: se omite y el resto se sube igual.
      - run: python generar_precios.py || echo "generar_precios.py falló — se omite precios.json"
      - name: commit y push si hay cambios
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add historico_maestro.csv sistema_regimen_tilt.json precios.json
          git diff --staged --quiet || git commit -m "Actualización automática $(date -u +%Y-%m-%d)"
          git push