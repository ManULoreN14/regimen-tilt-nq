name: Actualizar Régimen+Tilt

on:
  schedule:
    # 22:30 Madrid en horario de verano (CEST, UTC+2) -> 20:30 UTC.
    # En invierno (CET, UTC+1) esto corre a las 21:30 Madrid; sigue siendo
    # ~1.5 h tras el cierre de EE. UU., así que los datos ya están.
    - cron: '30 20 * * 1-5'
  workflow_dispatch: {}   # botón manual "Run workflow" en la pestaña Actions

permissions:
  contents: write          # necesario para que la Action pueda hacer push

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pandas numpy yfinance requests
      - run: python generar_datos.py
      - run: python construir_sistema.py
      - name: commit y push si hay cambios
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add historico_maestro.csv sistema_regimen_tilt.json
          git diff --staged --quiet || git commit -m "Actualización automática $(date -u +%Y-%m-%d)"
          git push
